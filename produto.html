<!DOCTYPE html>
<html lang="pt-br">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Produto • NeoStore</title>

<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="style.css">
<script>
tailwind.config = {
  theme: {
    extend: {
      colors: {
        primary: "#6c63ff"
      }
    }
  }
}
</script>

<style>
body{
  opacity:0;
  animation:fade .45s ease forwards;
}

@keyframes fade{
  to{opacity:1;}
}

.cartCount{
  font-size:11px;
  font-weight:700;
  line-height:1;
}

.addButton{
  width:100%;
  min-height:52px;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:14px 18px;
  border-radius:16px;
  font-weight:700;
  color:#fff;
  background:linear-gradient(135deg,#6366f1,#8b5cf6);
  box-shadow:0 12px 28px rgba(99,102,241,.30);
  transition:transform .22s ease, box-shadow .22s ease;
}

.addButton:hover{
  transform:translateY(-2px);
  box-shadow:0 18px 36px rgba(99,102,241,.36);
}

.qtyControl{
  width:100%;
  min-height:52px;
  display:grid;
  grid-template-columns:52px 1fr 52px;
  align-items:center;
  gap:12px;
  background:#0f141c;
  border:1px solid #2a3140;
  border-radius:16px;
  padding:8px;
}

.qtyValue{
  text-align:center;
  font-size:17px;
  font-weight:700;
  color:#e6edf3;
  user-select:none;
}

.qtyBtn{
  width:38px;
  height:38px;
  display:flex;
  align-items:center;
  justify-content:center;
  border-radius:12px;
  font-size:20px;
  font-weight:800;
  color:#fff;
  cursor:pointer;
  transition:transform .18s ease, filter .18s ease;
  user-select:none;
}

.qtyBtn:hover{
  transform:scale(1.08);
  filter:brightness(1.05);
}

.qtyBtn:active{
  transform:scale(.96);
}

.qtyBtn.minus{
  background:linear-gradient(135deg,#ef4444,#dc2626);
}

.qtyBtn.plus{
  background:linear-gradient(135deg,#6366f1,#8b5cf6);
}

.addCart{
  min-height:52px;
  display:flex;
  align-items:center;
  width:100%;
  max-width:260px;
}

.infoCard{
  background:#161b22;
  border:1px solid #222;
  border-radius:16px;
  padding:16px;
}

.thumb{
  cursor:pointer;
  transition:transform .22s ease, border-color .22s ease;
  border:1px solid #222;
}

.thumb:hover{
  transform:scale(1.04);
  border-color:#6c63ff;
}

.mainImageWrap{
  background:#161b22;
  border:1px solid #222;
  border-radius:24px;
  overflow:hidden;
}

.mainImage{
  width:100%;
  height:100%;
  object-fit:cover;
}
</style>
</head>

<body class="bg-[#0d1117] text-[#e6edf3] font-sans">

<header class="sticky top-0 z-50 backdrop-blur bg-[#0d1117]/85 border-b border-[#222]">
  <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between gap-6">

    <a href="index.html" class="text-xl font-bold tracking-wide hover:text-primary transition">
      NeoStore
    </a>

    <nav class="flex gap-8 text-sm text-gray-300">
      <a href="produtos.html" class="hover:text-white transition">Produtos</a>
      <a href="sobre.html" class="hover:text-white transition">Sobre</a>
      <a href="contato.html" class="hover:text-white transition">Contato</a>
    </nav>

    <button class="cart relative w-11 h-11 flex items-center justify-center rounded-xl bg-[#161b22] border border-[#2a2f36] hover:border-primary hover:scale-[1.03] transition">
      <span class="text-lg">🛒</span>
      <span class="cartCount absolute -top-2 -right-2 bg-primary text-white w-5 h-5 rounded-full flex items-center justify-center">
        0
      </span>
    </button>

  </div>
</header>

<main class="max-w-7xl mx-auto px-6 py-16">
  <section class="grid lg:grid-cols-2 gap-14 items-start">

    <div class="flex flex-col gap-4">
      <div class="mainImageWrap aspect-[6/5] shadow-2xl">
        <img id="mainImage" src="" alt="" class="mainImage">
      </div>

      <div id="thumbs" class="grid grid-cols-4 gap-3"></div>
    </div>

    <div class="card" id="productCard" data-name="" data-price="">
      <p class="text-sm text-gray-400 mb-3">NeoStore / Produto</p>

      <h1 id="productName" class="text-4xl font-bold mb-3"></h1>

      <div class="flex items-center gap-2 mb-4 text-yellow-400 text-sm">
        <span id="productStars">★★★★★</span>
        <span id="productReviews" class="text-gray-400"></span>
      </div>

      <p id="productPrice" class="text-primary text-3xl font-semibold mb-6"></p>

      <p id="productShort" class="opacity-80 mb-8 leading-relaxed text-[15px]"></p>

      <div class="grid sm:grid-cols-2 gap-4 mb-10" id="productInfoCards"></div>

      <div class="addCart"></div>
    </div>

  </section>

  <section class="pt-16">
    <h2 class="text-2xl font-semibold mb-6">Descrição detalhada</h2>
    <div id="productDescription" class="space-y-4 opacity-80 leading-relaxed max-w-4xl"></div>
  </section>

  <section class="pt-16 pb-4">
    <h2 class="text-2xl font-semibold mb-8">Especificações</h2>
    <div id="productSpecs" class="grid sm:grid-cols-2 lg:grid-cols-4 gap-6 text-sm"></div>
  </section>
</main>

<script src="script.js"></script>

<script>
const PRODUCTS = {
  "camiseta-minimal": {
    id: "camiseta-minimal",
    name: "Camiseta Minimal",
    price: 89.90,
    stars: "★★★★★",
    reviews: "(124 avaliações)",
    short: "Camiseta premium feita com algodão macio, toque confortável e visual limpo para compor looks casuais, urbanos e minimalistas com facilidade.",
    images: [
      "https://picsum.photos/600/500?fashion",
      "https://picsum.photos/200/200?1",
      "https://picsum.photos/200/200?2",
      "https://picsum.photos/200/200?3",
      "https://picsum.photos/200/200?4"
    ],
    infoCards: [
      ["Material", "100% Algodão Premium"],
      ["Envio", "Frete grátis"],
      ["Garantia", "30 dias"],
      ["Estilo", "Minimalista"]
    ],
    description: [
      "Lorem ipsum dolor sit amet, consectetur adipiscing elit. Suspendisse potenti. Sed ultricies, ligula vel vulputate viverra, lectus sem luctus lorem, vel tincidunt ipsum felis sit amet elit.",
      "Integer tincidunt orci nec lorem dignissim, quis ultricies mauris feugiat. Curabitur feugiat ultricies risus, sed tristique sapien feugiat non.",
      "Praesent vel massa ac elit placerat malesuada. Donec tempor risus in massa convallis, vel viverra elit efficitur."
    ],
    specs: [
      ["Composição", "Algodão 100%"],
      ["Peso", "180g"],
      ["Modelagem", "Regular Fit"],
      ["Origem", "Brasil"]
    ]
  },

  "tenis-casual": {
    id: "tenis-casual",
    name: "Tênis Casual",
    price: 199.90,
    stars: "★★★★★",
    reviews: "(89 avaliações)",
    short: "Tênis casual com conforto prolongado, visual urbano e estrutura leve para acompanhar a rotina com estilo e estabilidade.",
    images: [
      "https://picsum.photos/600/500?shoe",
      "https://picsum.photos/200/200?shoe1",
      "https://picsum.photos/200/200?shoe2",
      "https://picsum.photos/200/200?shoe3",
      "https://picsum.photos/200/200?shoe4"
    ],
    infoCards: [
      ["Material", "Tecido e borracha"],
      ["Envio", "Frete grátis"],
      ["Garantia", "90 dias"],
      ["Estilo", "Urbano Casual"]
    ],
    description: [
      "Lorem ipsum dolor sit amet, consectetur adipiscing elit. Integer sit amet erat quis neque facilisis porta.",
      "Vestibulum fermentum, justo ac consequat porttitor, arcu lorem convallis nulla, sed volutpat erat lorem in nibh.",
      "Nulla facilisi. Sed non arcu luctus, tincidunt libero vitae, faucibus arcu."
    ],
    specs: [
      ["Solado", "Borracha antiderrapante"],
      ["Peso", "320g"],
      ["Estrutura", "Leve e respirável"],
      ["Origem", "Brasil"]
    ]
  },

  "bone-street": {
    id: "bone-street",
    name: "Boné Street",
    price: 49.90,
    stars: "★★★★☆",
    reviews: "(61 avaliações)",
    short: "Boné streetwear com acabamento moderno, aba curva e ajuste confortável para completar composições urbanas com personalidade.",
    images: [
      "https://picsum.photos/600/500?cap",
      "https://picsum.photos/200/200?cap1",
      "https://picsum.photos/200/200?cap2",
      "https://picsum.photos/200/200?cap3",
      "https://picsum.photos/200/200?cap4"
    ],
    infoCards: [
      ["Material", "Sarja Premium"],
      ["Envio", "Frete econômico"],
      ["Garantia", "30 dias"],
      ["Estilo", "Streetwear"]
    ],
    description: [
      "Lorem ipsum dolor sit amet, consectetur adipiscing elit. Nam vitae magna sed erat suscipit pulvinar.",
      "Mauris fermentum, tellus sed ultricies malesuada, metus magna tristique mi, vitae faucibus erat sem vel justo.",
      "Aliquam erat volutpat. Nulla eu lacus et nibh lobortis lacinia."
    ],
    specs: [
      ["Fechamento", "Ajustável"],
      ["Peso", "90g"],
      ["Aba", "Curva"],
      ["Origem", "Brasil"]
    ]
  }
};

const params = new URLSearchParams(window.location.search);
const productId = params.get("id") || "camiseta-minimal";
const product = PRODUCTS[productId] || PRODUCTS["camiseta-minimal"];

/* título */
document.title = `${product.name} • NeoStore`;

/* card base para o script.js */
const productCard = document.getElementById("productCard");
productCard.dataset.name = product.name;
productCard.dataset.price = product.price.toFixed(2);

/* conteúdo principal */
document.getElementById("productName").textContent = product.name;
document.getElementById("productStars").textContent = product.stars;
document.getElementById("productReviews").textContent = product.reviews;
document.getElementById("productPrice").textContent = `R$${product.price.toFixed(2).replace(".", ",")}`;
document.getElementById("productShort").textContent = product.short;

/* imagem principal */
const mainImage = document.getElementById("mainImage");
mainImage.src = product.images[0];
mainImage.alt = product.name;

/* thumbs */
const thumbs = document.getElementById("thumbs");
thumbs.innerHTML = product.images.map((img, index) => `
  <img
    src="${img}"
    alt="${product.name} ${index + 1}"
    class="thumb rounded-xl aspect-square object-cover"
  >
`).join("");

thumbs.querySelectorAll(".thumb").forEach((img) => {
  img.onclick = () => {
    mainImage.src = img.src;
    mainImage.alt = img.alt;
  };
});

/* info cards */
document.getElementById("productInfoCards").innerHTML = product.infoCards.map(([title, value]) => `
  <div class="infoCard">
    <p class="text-sm opacity-60">${title}</p>
    <p class="font-semibold mt-1">${value}</p>
  </div>
`).join("");

/* descrição */
document.getElementById("productDescription").innerHTML = product.description.map((text) => `
  <p>${text}</p>
`).join("");

/* specs */
document.getElementById("productSpecs").innerHTML = product.specs.map(([title, value]) => `
  <div class="infoCard">
    <p class="opacity-60">${title}</p>
    <p class="font-semibold mt-1">${value}</p>
  </div>
`).join("");

/* re-render do botão depois dos datasets estarem prontos */
if (typeof renderButtons === "function") {
  renderButtons();
}
</script>

</body>
</html>
